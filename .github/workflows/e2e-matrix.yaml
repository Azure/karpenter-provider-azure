name: E2EMatrix
on:
  workflow_call:
    inputs:
      git_ref:
        type: string
      location:
        type: string
        description: "the azure location to run the e2e test in"
        default: "eastus"
      provision_mode:
        type: string
        description: "the karpenter provisioning mode to run the e2e test in"
        default: "aksscriptless"
      k8s_version:
        type: string
        description: "the kubernetes version to use (e.g., 1.30). If empty, uses AKS default."
      azure_vm_size:
        type: string
        description: "the azure vm size to use for the e2e test (set to empty string to allow AKS to default)"
        default: "Standard_D4ds_v5"  # We have more quota for this VM size so force it to avoid quota errors
    secrets:
      E2E_CLIENT_ID_TEST:
        required: true
      E2E_SUBSCRIPTION_ID_TEST:
        required: true

permissions:
  contents: read

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        suite:
          - ACR
          - BYOK
          - Chaos
          - Consolidation
          - Drift
          - GPU
          - InPlaceUpdate
          - Integration
          - KubernetesUpgrade
          - Machine
          - NewSKUs
          - NodeClaim
          - Scheduling
          - Spot
          - Subnet
          - Utilization
    permissions:
      contents: read
      statuses: write
    uses: ./.github/workflows/e2e.yaml
    with:
      git_ref: ${{ inputs.git_ref }}
      suite: ${{ matrix.suite }}
      location: ${{ inputs.location }}
      provision_mode: ${{ inputs.provision_mode || 'aksscriptless' }}
      k8s_version: ${{ inputs.k8s_version }}
      azure_vm_size: ${{ inputs.azure_vm_size }}
    secrets:
      E2E_CLIENT_ID_TEST: ${{ secrets.E2E_CLIENT_ID_TEST }}
      E2E_SUBSCRIPTION_ID_TEST: ${{ secrets.E2E_SUBSCRIPTION_ID_TEST }}
