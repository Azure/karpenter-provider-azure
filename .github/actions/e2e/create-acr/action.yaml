name: CreateACR
description: 'Creates ACR'
inputs:
  subscription_id:
    description: "Subscription ID"
    required: true
  resource_group:
    description: "Name of the resource group to create the cluster within"
    required: true
  acr_name:
    description: "Name of the acr holding the karpenter image"
    required: true
  git_ref:
    description: "The git commit, tag, or branch to check out"
    required: false
  location:
    description: "The azure location to run the e2e test in"
    default: "eastus"
runs:
  using: "composite"
  steps:
  - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    with:
      ref: ${{ inputs.git_ref }}
  - name: create ACR
    shell: bash
    env:
      AZURE_RESOURCE_GROUP: ${{ inputs.resource_group }}
      AZURE_ACR_NAME: ${{ inputs.acr_name }}
      AZURE_LOCATION: ${{ inputs.location }}
    run: make az-mkacr
  - name: import needed images
    shell: bash
    env:
      AZURE_ACR_NAME: ${{ inputs.acr_name }}
    run: |
      make az-acrimport
