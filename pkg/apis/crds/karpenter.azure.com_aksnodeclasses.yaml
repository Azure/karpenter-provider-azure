---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: aksnodeclasses.karpenter.azure.com
spec:
  group: karpenter.azure.com
  names:
    categories:
    - karpenter
    - nap
    kind: AKSNodeClass
    listKind: AKSNodeClassList
    plural: aksnodeclasses
    shortNames:
    - aksnc
    - aksncs
    singular: aksnodeclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .spec.imageFamily
      name: ImageFamily
      priority: 1
      type: string
    deprecated: true
    deprecationWarning: use v1beta1.AKSNodeClass instead
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: AKSNodeClass is the Schema for the AKSNodeClass API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              spec is the top level specification for the AKS Karpenter Provider.
              This will contain configuration necessary to launch instances in AKS.
            properties:
              artifactStreaming:
                description: |-
                  artifactStreaming configures artifact streaming for provisioned nodes.
                  Artifact streaming allows container images to be streamed on demand to nodes rather than fully downloaded before starting.
                properties:
                  enabled:
                    description: |-
                      enabled controls the artifact streaming mode. Artifact streaming speeds up the cold-start of containers on a node through on-demand image loading. To use this feature, container images must also enable artifact streaming on ACR.
                      If not specified, defaults to false.
                    type: boolean
                type: object
              fipsMode:
                description: fipsMode controls FIPS compliance for the provisioned
                  nodes
                enum:
                - FIPS
                - Disabled
                type: string
              imageFamily:
                default: Ubuntu
                description: imageFamily is the image family that instances use.
                enum:
                - Ubuntu
                - Ubuntu2204
                - Ubuntu2404
                - AzureLinux
                type: string
              kubelet:
                description: |-
                  kubelet defines args to be used when configuring kubelet on provisioned nodes.
                  They are a subset of the upstream types, recognizing not all options may be supported.
                  Wherever possible, the types and names should reflect the upstream kubelet types.
                properties:
                  allowedUnsafeSysctls:
                    description: |-
                      allowedUnsafeSysctls is a comma separated whitelist of unsafe sysctls or sysctl patterns (ending in `*`).
                      Unsafe sysctl groups are `kernel.shm*`, `kernel.msg*`, `kernel.sem`, `fs.mqueue.*`,
                      and `net.*`. For example: "`kernel.msg*,net.ipv4.route.min_pmtu`"
                    items:
                      type: string
                    type: array
                  containerLogMaxFiles:
                    default: 5
                    description: containerLogMaxFiles specifies the maximum number
                      of container log files that can be present for a container.
                    format: int32
                    minimum: 2
                    type: integer
                  containerLogMaxSize:
                    default: 50Mi
                    description: |-
                      containerLogMaxSize is a quantity defining the maximum size of the container log
                      file before it is rotated. For example: "5Mi" or "256Ki".
                      AKS CustomKubeletConfig has containerLogMaxSizeMB (with units), defaults to 50
                    pattern: ^\d+(E|P|T|G|M|K|Ei|Pi|Ti|Gi|Mi|Ki)$
                    type: string
                  cpuCFSQuota:
                    default: true
                    description: |-
                      cpuCFSQuota enables CPU CFS quota enforcement for containers that specify CPU limits.
                      Note: AKS CustomKubeletConfig uses cpuCfsQuota (camelCase)
                    type: boolean
                  cpuCFSQuotaPeriod:
                    default: 100ms
                    description: |-
                      cpuCFSQuotaPeriod sets the CPU CFS quota period value, `cpu.cfs_period_us`.
                      The value must be between 1 ms and 1 second, inclusive.
                    type: string
                  cpuManagerPolicy:
                    default: none
                    description: cpuManagerPolicy is the name of the policy to use.
                    enum:
                    - none
                    - static
                    type: string
                  failSwapOn:
                    description: |-
                      failSwapOn tells the kubelet to fail to start if swap is enabled on the node.
                      Must be set to false to allow linuxOSConfig.swapFileSize to take effect.
                    type: boolean
                  imageGCHighThresholdPercent:
                    description: |-
                      imageGCHighThresholdPercent is the percent of disk usage after which image
                      garbage collection is always run. The percent is calculated by dividing this
                      field value by 100, so this field must be between 0 and 100, inclusive.
                      When specified, the value must be greater than ImageGCLowThresholdPercent.
                      Note: AKS CustomKubeletConfig does not have "Percent" in the field name
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  imageGCLowThresholdPercent:
                    description: |-
                      imageGCLowThresholdPercent is the percent of disk usage before which image
                      garbage collection is never run. Lowest disk usage to garbage collect to.
                      The percent is calculated by dividing this field value by 100,
                      so the field value must be between 0 and 100, inclusive.
                      When specified, the value must be less than imageGCHighThresholdPercent
                      Note: AKS CustomKubeletConfig does not have "Percent" in the field name
                    format: int32
                    maximum: 100
                    minimum: 0
                    type: integer
                  podPidsLimit:
                    description: |-
                      podPidsLimit is the maximum number of PIDs in any pod.
                      AKS CustomKubeletConfig uses PodMaxPids, int32 (!)
                      Default: -1
                    format: int64
                    type: integer
                  topologyManagerPolicy:
                    default: none
                    description: |-
                      topologyManagerPolicy is the name of the topology manager policy to use.
                      Valid values include:

                      - `restricted`: kubelet only allows pods with optimal NUMA node alignment for requested resources;
                      - `best-effort`: kubelet will favor pods with NUMA alignment of CPU and device resources;
                      - `none`: kubelet has no knowledge of NUMA alignment of a pod's CPU and device resources.
                      - `single-numa-node`: kubelet only allows pods with a single NUMA alignment
                        of CPU and device resources.
                    enum:
                    - restricted
                    - best-effort
                    - none
                    - single-numa-node
                    type: string
                type: object
                x-kubernetes-validations:
                - message: imageGCHighThresholdPercent must be greater than imageGCLowThresholdPercent
                  rule: 'has(self.imageGCHighThresholdPercent) && has(self.imageGCLowThresholdPercent)
                    ?  self.imageGCHighThresholdPercent > self.imageGCLowThresholdPercent  :
                    true'
              linuxOSConfig:
                description: |-
                  linuxOSConfig specifies OS settings for Linux agent nodes.
                  These map to the AKS Custom Linux OS Configuration feature.
                  For more information, see:
                  https://learn.microsoft.com/en-us/azure/aks/custom-node-configuration
                properties:
                  swapFileSize:
                    description: |-
                      swapFileSize specifies the size of a swap file that will be created on each node.
                      For example: "1500Mi" or "2Gi".
                      The value will be rounded to the nearest megabyte due to system limitations.
                    pattern: ^\d+(E|P|T|G|M|K|Ei|Pi|Ti|Gi|Mi|Ki)$
                    type: string
                  sysctls:
                    description: sysctls specifies sysctl settings for Linux agent
                      nodes.
                    properties:
                      fsAioMaxNr:
                        description: |-
                          fsAioMaxNr specifies the maximum number of AIO (Asynchronous I/O) requests.
                          Maps to fs.aio-max-nr.
                        format: int32
                        maximum: 6553500
                        minimum: 65536
                        type: integer
                      fsFileMax:
                        description: |-
                          fsFileMax specifies the maximum number of file handles the kernel will allocate.
                          Maps to fs.file-max.
                        format: int32
                        maximum: 12000500
                        minimum: 8192
                        type: integer
                      fsInotifyMaxUserWatches:
                        description: |-
                          fsInotifyMaxUserWatches specifies the maximum number of inotify watches per user.
                          Maps to fs.inotify.max_user_watches.
                        format: int32
                        maximum: 2097152
                        minimum: 781250
                        type: integer
                      fsNrOpen:
                        description: |-
                          fsNrOpen specifies the maximum number of file handles that can be allocated.
                          Maps to fs.nr_open.
                        format: int32
                        maximum: 20000500
                        minimum: 8192
                        type: integer
                      kernelThreadsMax:
                        description: |-
                          kernelThreadsMax specifies the maximum number of threads that can be created.
                          Maps to kernel.threads-max.
                        format: int32
                        maximum: 513785
                        minimum: 20
                        type: integer
                      netCoreNetdevMaxBacklog:
                        description: |-
                          netCoreNetdevMaxBacklog specifies the maximum number of packets queued on the INPUT side.
                          Maps to net.core.netdev_max_backlog.
                        format: int32
                        maximum: 3240000
                        minimum: 1000
                        type: integer
                      netCoreOptmemMax:
                        description: |-
                          netCoreOptmemMax specifies the maximum ancillary buffer size (option memory buffer) allowed per socket.
                          Maps to net.core.optmem_max.
                        format: int32
                        maximum: 4194304
                        minimum: 20480
                        type: integer
                      netCoreRmemDefault:
                        description: |-
                          netCoreRmemDefault specifies the default receive socket buffer size in bytes.
                          Maps to net.core.rmem_default.
                        format: int32
                        maximum: 134217728
                        minimum: 212992
                        type: integer
                      netCoreRmemMax:
                        description: |-
                          netCoreRmemMax specifies the maximum receive socket buffer size in bytes.
                          Maps to net.core.rmem_max.
                        format: int32
                        maximum: 134217728
                        minimum: 212992
                        type: integer
                      netCoreSomaxconn:
                        description: |-
                          netCoreSomaxconn specifies the maximum number of connection requests that can be queued for any given listening socket.
                          Maps to net.core.somaxconn.
                        format: int32
                        maximum: 3240000
                        minimum: 4096
                        type: integer
                      netCoreWmemDefault:
                        description: |-
                          netCoreWmemDefault specifies the default send socket buffer size in bytes.
                          Maps to net.core.wmem_default.
                        format: int32
                        maximum: 134217728
                        minimum: 212992
                        type: integer
                      netCoreWmemMax:
                        description: |-
                          netCoreWmemMax specifies the maximum send socket buffer size in bytes.
                          Maps to net.core.wmem_max.
                        format: int32
                        maximum: 134217728
                        minimum: 212992
                        type: integer
                      netIPv4IPLocalPortRange:
                        description: |-
                          netIPv4IPLocalPortRange specifies the local port range that is used by TCP and UDP traffic.
                          Must be in the format "first last", where first is in the range 1024-60999 and last is in the range 32768-65535.
                          Maps to net.ipv4.ip_local_port_range.
                        pattern: ^\d+ \d+$
                        type: string
                      netIPv4NeighDefaultGcThresh1:
                        description: |-
                          netIPv4NeighDefaultGcThresh1 specifies the minimum number of entries that may be in the ARP cache.
                          Maps to net.ipv4.neigh.default.gc_thresh1.
                        format: int32
                        maximum: 80000
                        minimum: 128
                        type: integer
                      netIPv4NeighDefaultGcThresh2:
                        description: |-
                          netIPv4NeighDefaultGcThresh2 specifies the soft maximum number of entries that may be in the ARP cache.
                          Maps to net.ipv4.neigh.default.gc_thresh2.
                        format: int32
                        maximum: 90000
                        minimum: 512
                        type: integer
                      netIPv4NeighDefaultGcThresh3:
                        description: |-
                          netIPv4NeighDefaultGcThresh3 specifies the hard maximum number of entries in the ARP cache.
                          Maps to net.ipv4.neigh.default.gc_thresh3.
                        format: int32
                        maximum: 100000
                        minimum: 1024
                        type: integer
                      netIPv4TCPFinTimeout:
                        description: |-
                          netIPv4TCPFinTimeout specifies the length of time an orphaned connection will remain in the FIN_WAIT_2 state before being aborted.
                          Maps to net.ipv4.tcp_fin_timeout.
                        format: int32
                        maximum: 120
                        minimum: 5
                        type: integer
                      netIPv4TCPKeepaliveIntvl:
                        description: |-
                          netIPv4TCPKeepaliveIntvl specifies the frequency of the probes sent out. Measured in seconds.
                          Maps to net.ipv4.tcp_keepalive_intvl.
                        format: int32
                        maximum: 90
                        minimum: 10
                        type: integer
                      netIPv4TCPKeepaliveProbes:
                        description: |-
                          netIPv4TCPKeepaliveProbes specifies the number of keepalive probes TCP sends out until it decides a connection is broken.
                          Maps to net.ipv4.tcp_keepalive_probes.
                        format: int32
                        maximum: 15
                        minimum: 1
                        type: integer
                      netIPv4TCPKeepaliveTime:
                        description: |-
                          netIPv4TCPKeepaliveTime specifies the rate at which TCP sends keepalive probes. Measured in seconds.
                          Maps to net.ipv4.tcp_keepalive_time.
                        format: int32
                        maximum: 432000
                        minimum: 30
                        type: integer
                      netIPv4TCPMaxSynBacklog:
                        description: |-
                          netIPv4TCPMaxSynBacklog specifies the maximum number of queued connection requests that have still not received
                          an acknowledgment from the connecting client. If this number is exceeded, the kernel will begin dropping requests.
                          Maps to net.ipv4.tcp_max_syn_backlog.
                        format: int32
                        maximum: 3240000
                        minimum: 128
                        type: integer
                      netIPv4TCPMaxTwBuckets:
                        description: |-
                          netIPv4TCPMaxTwBuckets specifies the maximum number of sockets in TIME_WAIT state.
                          Maps to net.ipv4.tcp_max_tw_buckets.
                        format: int32
                        maximum: 1440000
                        minimum: 8000
                        type: integer
                      netIPv4TCPTwReuse:
                        description: |-
                          netIPv4TCPTwReuse enables/disables reuse of TIME_WAIT sockets for new connections.
                          Maps to net.ipv4.tcp_tw_reuse.
                        type: boolean
                      netNetfilterNfConntrackBuckets:
                        description: |-
                          netNetfilterNfConntrackBuckets specifies the size of the hash table used by nf_conntrack module.
                          Maps to net.netfilter.nf_conntrack_buckets.
                        format: int32
                        maximum: 524288
                        minimum: 65536
                        type: integer
                      netNetfilterNfConntrackMax:
                        description: |-
                          netNetfilterNfConntrackMax specifies the maximum number of connections tracked by the nf_conntrack module.
                          Maps to net.netfilter.nf_conntrack_max.
                        format: int32
                        maximum: 2097152
                        minimum: 131072
                        type: integer
                      vmMaxMapCount:
                        description: |-
                          vmMaxMapCount specifies the maximum number of memory map areas a process may have.
                          Maps to vm.max_map_count.
                        format: int32
                        maximum: 262144
                        minimum: 65530
                        type: integer
                      vmSwappiness:
                        description: |-
                          vmSwappiness specifies the kernel's tendency to swap memory pages. Higher values increase aggressiveness, lower values decrease it.
                          Maps to vm.swappiness.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      vmVfsCachePressure:
                        description: |-
                          vmVfsCachePressure specifies the tendency of the kernel to reclaim the memory which is used for caching of directory and inode objects.
                          Maps to vm.vfs_cache_pressure.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                    type: object
                    x-kubernetes-validations:
                    - message: netCoreRmemDefault must be <= netCoreRmemMax
                      rule: 'has(self.netCoreRmemDefault) && has(self.netCoreRmemMax)
                        ? self.netCoreRmemDefault <= self.netCoreRmemMax : true'
                    - message: netCoreWmemDefault must be <= netCoreWmemMax
                      rule: 'has(self.netCoreWmemDefault) && has(self.netCoreWmemMax)
                        ? self.netCoreWmemDefault <= self.netCoreWmemMax : true'
                    - message: netIPv4NeighDefaultGcThresh1 must be <= netIPv4NeighDefaultGcThresh2
                      rule: 'has(self.netIPv4NeighDefaultGcThresh1) && has(self.netIPv4NeighDefaultGcThresh2)
                        ? self.netIPv4NeighDefaultGcThresh1 <= self.netIPv4NeighDefaultGcThresh2
                        : true'
                    - message: netIPv4NeighDefaultGcThresh2 must be <= netIPv4NeighDefaultGcThresh3
                      rule: 'has(self.netIPv4NeighDefaultGcThresh2) && has(self.netIPv4NeighDefaultGcThresh3)
                        ? self.netIPv4NeighDefaultGcThresh2 <= self.netIPv4NeighDefaultGcThresh3
                        : true'
                    - message: netIPv4IPLocalPortRange first port must be in [1024,
                        60999]
                      rule: '!has(self.netIPv4IPLocalPortRange) || (int(self.netIPv4IPLocalPortRange.split(''
                        '')[0]) >= 1024 && int(self.netIPv4IPLocalPortRange.split(''
                        '')[0]) <= 60999)'
                    - message: netIPv4IPLocalPortRange last port must be in [32768,
                        65535]
                      rule: '!has(self.netIPv4IPLocalPortRange) || (int(self.netIPv4IPLocalPortRange.split(''
                        '')[1]) >= 32768 && int(self.netIPv4IPLocalPortRange.split(''
                        '')[1]) <= 65535)'
                    - message: netIPv4IPLocalPortRange first port must be <= last
                        port
                      rule: '!has(self.netIPv4IPLocalPortRange) || int(self.netIPv4IPLocalPortRange.split(''
                        '')[0]) <= int(self.netIPv4IPLocalPortRange.split('' '')[1])'
                  transparentHugePageDefrag:
                    description: |-
                      transparentHugePageDefrag sets the kernel's transparent_hugepage/defrag behavior.
                      Maps to /sys/kernel/mm/transparent_hugepage/defrag.
                    enum:
                    - always
                    - defer
                    - defer+madvise
                    - madvise
                    - never
                    type: string
                  transparentHugePageEnabled:
                    description: |-
                      transparentHugePageEnabled sets the kernel's transparent_hugepage/enabled behavior.
                      Maps to /sys/kernel/mm/transparent_hugepage/enabled.
                    enum:
                    - always
                    - madvise
                    - never
                    type: string
                type: object
              localDNS:
                description: |-
                  localDNS configures the per-node local DNS, with VnetDNS and KubeDNS overrides.
                  LocalDNS helps improve performance and reliability of DNS resolution in an AKS cluster.
                  For more details see aka.ms/aks/localdns.
                properties:
                  kubeDNSOverrides:
                    description: kubeDNSOverrides apply to DNS traffic from pods with
                      dnsPolicy:ClusterFirst (referred to as KubeDNS traffic).
                    items:
                      description: LocalDNSZoneOverride specifies DNS override configuration
                        for a specific zone
                      properties:
                        cacheDuration:
                          description: Cache max TTL. See [cache plugin](https://coredns.io/plugins/cache)
                            for more information.
                          pattern: ^([0-9]+(s|m|h))+$
                          type: string
                        forwardDestination:
                          description: forwardDestination is the destination server
                            for DNS queries to be forwarded from localDNS.
                          enum:
                          - ClusterCoreDNS
                          - VnetDNS
                          type: string
                        forwardPolicy:
                          description: forwardPolicy is the forward policy for selecting
                            upstream DNS server. See [forward plugin](https://coredns.io/plugins/forward)
                            for more information.
                          enum:
                          - Sequential
                          - RoundRobin
                          - Random
                          type: string
                        maxConcurrent:
                          description: maxConcurrent is the maximum number of concurrent
                            queries. See [forward plugin](https://coredns.io/plugins/forward)
                            for more information.
                          format: int32
                          minimum: 0
                          type: integer
                        protocol:
                          description: protocol enforces TCP or prefers UDP protocol
                            for connections from localDNS to upstream DNS server.
                          enum:
                          - PreferUDP
                          - ForceTCP
                          type: string
                        queryLogging:
                          description: queryLogging is the log level for DNS queries
                            in localDNS.
                          enum:
                          - Error
                          - Log
                          type: string
                        serveStale:
                          description: serveStale is the policy for serving stale
                            data. See [cache plugin](https://coredns.io/plugins/cache)
                            for more information.
                          enum:
                          - Verify
                          - Immediate
                          - Disable
                          type: string
                        serveStaleDuration:
                          description: Serve stale duration. See [cache plugin](https://coredns.io/plugins/cache)
                            for more information.
                          pattern: ^([0-9]+(s|m|h))+$
                          type: string
                        zone:
                          description: zone is the DNS zone this override applies
                            to (e.g., ".", "cluster.local").
                          maxLength: 254
                          minLength: 1
                          pattern: ^(\.|[A-Za-z0-9]([A-Za-z0-9_-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9_-]{0,61}[A-Za-z0-9])?)*\.?)$
                          type: string
                      required:
                      - cacheDuration
                      - forwardDestination
                      - forwardPolicy
                      - maxConcurrent
                      - protocol
                      - queryLogging
                      - serveStale
                      - serveStaleDuration
                      - zone
                      type: object
                      x-kubernetes-validations:
                      - message: '''cluster.local'' cannot be forwarded to VnetDNS'
                        rule: '!(self.zone.endsWith(''cluster.local'') && self.forwardDestination
                          == ''VnetDNS'')'
                      - message: serveStale Verify cannot be used with protocol ForceTCP
                        rule: '!(self.serveStale == ''Verify'' && self.protocol ==
                          ''ForceTCP'')'
                    maxItems: 100
                    type: array
                    x-kubernetes-list-map-keys:
                    - zone
                    x-kubernetes-list-type: map
                    x-kubernetes-validations:
                    - message: must contain required zones '.' and 'cluster.local'
                      rule: '[''.'', ''cluster.local''].all(z, self.exists(x, x.zone
                        == z))'
                  mode:
                    description: mode of enablement for localDNS.
                    enum:
                    - Preferred
                    - Required
                    - Disabled
                    type: string
                  vnetDNSOverrides:
                    description: vnetDNSOverrides apply to DNS traffic from pods with
                      dnsPolicy:default or kubelet (referred to as VnetDNS traffic).
                    items:
                      description: LocalDNSZoneOverride specifies DNS override configuration
                        for a specific zone
                      properties:
                        cacheDuration:
                          description: Cache max TTL. See [cache plugin](https://coredns.io/plugins/cache)
                            for more information.
                          pattern: ^([0-9]+(s|m|h))+$
                          type: string
                        forwardDestination:
                          description: forwardDestination is the destination server
                            for DNS queries to be forwarded from localDNS.
                          enum:
                          - ClusterCoreDNS
                          - VnetDNS
                          type: string
                        forwardPolicy:
                          description: forwardPolicy is the forward policy for selecting
                            upstream DNS server. See [forward plugin](https://coredns.io/plugins/forward)
                            for more information.
                          enum:
                          - Sequential
                          - RoundRobin
                          - Random
                          type: string
                        maxConcurrent:
                          description: maxConcurrent is the maximum number of concurrent
                            queries. See [forward plugin](https://coredns.io/plugins/forward)
                            for more information.
                          format: int32
                          minimum: 0
                          type: integer
                        protocol:
                          description: protocol enforces TCP or prefers UDP protocol
                            for connections from localDNS to upstream DNS server.
                          enum:
                          - PreferUDP
                          - ForceTCP
                          type: string
                        queryLogging:
                          description: queryLogging is the log level for DNS queries
                            in localDNS.
                          enum:
                          - Error
                          - Log
                          type: string
                        serveStale:
                          description: serveStale is the policy for serving stale
                            data. See [cache plugin](https://coredns.io/plugins/cache)
                            for more information.
                          enum:
                          - Verify
                          - Immediate
                          - Disable
                          type: string
                        serveStaleDuration:
                          description: Serve stale duration. See [cache plugin](https://coredns.io/plugins/cache)
                            for more information.
                          pattern: ^([0-9]+(s|m|h))+$
                          type: string
                        zone:
                          description: zone is the DNS zone this override applies
                            to (e.g., ".", "cluster.local").
                          maxLength: 254
                          minLength: 1
                          pattern: ^(\.|[A-Za-z0-9]([A-Za-z0-9_-]{0,61}[A-Za-z0-9])?(\.[A-Za-z0-9]([A-Za-z0-9_-]{0,61}[A-Za-z0-9])?)*\.?)$
                          type: string
                      required:
                      - cacheDuration
                      - forwardDestination
                      - forwardPolicy
                      - maxConcurrent
                      - protocol
                      - queryLogging
                      - serveStale
                      - serveStaleDuration
                      - zone
                      type: object
                      x-kubernetes-validations:
                      - message: '''cluster.local'' cannot be forwarded to VnetDNS'
                        rule: '!(self.zone.endsWith(''cluster.local'') && self.forwardDestination
                          == ''VnetDNS'')'
                      - message: serveStale Verify cannot be used with protocol ForceTCP
                        rule: '!(self.serveStale == ''Verify'' && self.protocol ==
                          ''ForceTCP'')'
                    maxItems: 100
                    type: array
                    x-kubernetes-list-map-keys:
                    - zone
                    x-kubernetes-list-type: map
                    x-kubernetes-validations:
                    - message: must contain required zones '.' and 'cluster.local'
                      rule: '[''.'', ''cluster.local''].all(z, self.exists(x, x.zone
                        == z))'
                    - message: root zone '.' cannot be forwarded to ClusterCoreDNS
                        from vnetDNSOverrides
